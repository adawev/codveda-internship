services:
  db:
    image: postgres:16
    container_name: codveda-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:?set DB_NAME}
      POSTGRES_USER: ${DB_USERNAME:?set DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: codveda-backend
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:?set DB_NAME}
      DB_USERNAME: ${DB_USERNAME:?set DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?set APP_JWT_SECRET}
      APP_JWT_ACCESS_EXPIRATION_MS: 900000
      APP_JWT_REFRESH_EXPIRATION_MS: 604800000
      APP_AUTH_REFRESH_COOKIE_SECURE: "true"
    ports:
      - "8080:8080"

volumes:
  pgdata:
