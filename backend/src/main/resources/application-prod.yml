spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
logging:
  level:
    root: INFO

app:
  jwt:
    secret: ${APP_JWT_SECRET}
  auth:
    refresh-cookie-secure: ${APP_AUTH_REFRESH_COOKIE_SECURE:true}
